plugins {
    id 'com.android.application'
}

android {
    namespace 'com.univishwas.app'
    compileSdk 35

    defaultConfig {
        applicationId "com.univishwas.app"
        minSdk 21
        targetSdk 35
        versionCode 6
        versionName "1.2.0"
    }

    buildTypes {
        debug {
            // Debug builds are signed with the SDK's auto-generated debug keystore,
            // so the APK produced by GitHub Actions is sideload-installable with no
            // extra signing setup. That's exactly what the workflow ships.
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
            debuggable true
            minifyEnabled false
        }
        release {
            // The release variant is wired up but unsigned by default. To produce a
            // signed release APK, set the four UNI_* secrets in your repo and the
            // CI workflow will sign automatically. See README.md.
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                    'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildFeatures {
        buildConfig true
    }

    packaging {
        resources {
            excludes += ['META-INF/AL2.0', 'META-INF/LGPL2.1']
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.core:core:1.12.0'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
    implementation 'androidx.activity:activity:1.8.2'
    implementation 'androidx.webkit:webkit:1.10.0'
}
